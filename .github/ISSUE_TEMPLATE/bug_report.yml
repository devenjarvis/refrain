name: Bug report
description: Something in Refrain is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill out the fields below so we can reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, in one or two sentences?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact steps someone else can run to see the bug.
      placeholder: |
        1. Run `refrain` in a repo with 2+ agents
        2. Press `d` on agent 1
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages or screenshots if relevant.
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: "`refrain doctor` output"
      description: Paste the full output of `refrain doctor`. This is the fastest way to triage most issues.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Refrain version
      description: Output of `refrain --version`.
      placeholder: "refrain 0.1.0 (abc123, 2026-01-01)"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.5 / Ubuntu 24.04 / ..."
    validations:
      required: true
  - type: input
    id: go
    attributes:
      label: Go version (only if building from source)
      description: Output of `go version`.
      placeholder: "go version go1.25.0 darwin/arm64"
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: Logs, config snippets, related issues — anything that might help.
    validations:
      required: false
