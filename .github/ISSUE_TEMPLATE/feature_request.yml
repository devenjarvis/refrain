name: Feature request
description: Suggest a new feature or enhancement for Refrain.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do? What's getting in the way today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like Refrain to do? A rough sketch is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they fell short.
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: Screenshots, mockups, links to related issues.
    validations:
      required: false
