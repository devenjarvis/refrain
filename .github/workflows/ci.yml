name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Configure git for tests
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@test.com"

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -timeout 120s ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.1
          install-mode: goinstall

      - name: Check formatting (gofumpt)
        run: |
          go install mvdan.cc/gofumpt@latest
          test -z "$(gofumpt -l .)"

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Configure git for tests
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@test.com"

      - name: Install tu
        run: |
          curl -fsSL https://raw.githubusercontent.com/flipbit03/terminal-use/main/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build refrain
        run: go build -o refrain .

      - name: Run e2e tests
        run: go test -tags e2e -timeout 300s -v ./internal/e2e/
