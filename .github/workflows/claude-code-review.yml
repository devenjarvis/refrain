# =============================================================================
# Multi-Agent Claude PR Review
# -----------------------------------------------------------------------------
# Architecture:
#   1. Four Haiku specialists review the PR in parallel (security, performance,
#      testing, correctness). Each writes findings to a JSON artifact.
#   2. A triage job inspects changed paths and, if anything sensitive was
#      touched, kicks off a Sonnet deep-review in parallel.
#   3. A synthesis job (Haiku) downloads all findings, runs a critique pass
#      (dedupe, cull false positives, verify against diff), and posts ONE
#      consolidated review comment.
#
# Typical cost: ~$0.04-0.06 per PR (Haiku-only), ~$0.20-0.30 if Sonnet
# escalation triggers. Wall-clock latency ≈ one specialist run + synthesis.
# =============================================================================

name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Parallel specialists — each Haiku stays narrowly focused on one concern.
  # Findings schema (all agents):
  #   { "agent": "<name>",
  #     "findings": [
  #       { "file": str, "line": int, "severity": "high|medium|low",
  #         "title": str, "explanation": str } ] }
  # ---------------------------------------------------------------------------
  security-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-haiku-4-5-20251001 --max-turns 4"
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} for SECURITY issues ONLY.

            Look for:
              - Injection (SQL, command, XSS, SSRF, template)
              - Auth/authz flaws, missing access checks, IDOR
              - Secrets or credentials accidentally committed
              - Unsafe deserialization, path traversal, zip-slip
              - Cryptographic misuse (weak primitives, hardcoded IVs, ECB, etc.)
              - CSRF, CORS, cookie misconfiguration

            Ignore everything else — style, performance, tests are NOT your job.
            Be conservative: only report what you are confident about.

            Steps:
              1. Run: gh pr diff ${{ github.event.pull_request.number }}
              2. Read related files if you need context.
              3. Write findings JSON to /tmp/findings-security.json.
              4. Empty findings array is a valid result.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: findings-security
          path: /tmp/findings-security.json
          if-no-files-found: ignore

  performance-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-haiku-4-5-20251001 --max-turns 4"
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} for PERFORMANCE issues ONLY.

            Look for:
              - N+1 queries, missing indexes, full table scans
              - Algorithmic regressions (O(n²) where O(n) was possible)
              - Memory leaks, unbounded allocations or buffers
              - Blocking I/O on hot paths, missing concurrency where it matters
              - Expensive operations inside tight loops or per-request

            DO NOT flag micro-optimizations or speculative concerns. Only real-world impact.

            Steps:
              1. gh pr diff ${{ github.event.pull_request.number }}
              2. Write findings JSON to /tmp/findings-performance.json.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: findings-performance
          path: /tmp/findings-performance.json
          if-no-files-found: ignore

  testing-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-haiku-4-5-20251001 --max-turns 4"
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} for TEST COVERAGE issues ONLY.

            Look for:
              - New non-trivial code that lacks tests
              - Edge cases missed: null/empty, boundaries, error paths
              - Tests that don't actually assert the behavior they describe
              - Tests likely to be flaky (timing, network, ordering)

            DO NOT request tests for trivial getters/setters, config-only changes, or pure renames.

            Steps:
              1. gh pr diff ${{ github.event.pull_request.number }}
              2. Write findings JSON to /tmp/findings-testing.json.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: findings-testing
          path: /tmp/findings-testing.json
          if-no-files-found: ignore

  correctness-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-haiku-4-5-20251001 --max-turns 4"
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} for CORRECTNESS / LOGIC issues ONLY.

            Look for:
              - Off-by-one, inverted conditionals, broken short-circuits
              - Race conditions, missing locks, unsafe shared state
              - Unhandled errors, swallowed exceptions, ignored return values
              - API contract violations (changed return types, removed fields, status code drift)
              - Resource leaks (unclosed files, connections, handles, timers)

            Steps:
              1. gh pr diff ${{ github.event.pull_request.number }}
              2. Write findings JSON to /tmp/findings-correctness.json.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: findings-correctness
          path: /tmp/findings-correctness.json
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Synthesis: critique pass, then post ONE consolidated comment.
  # ---------------------------------------------------------------------------
  synthesize:
    needs:
      - security-review
      - performance-review
      - testing-review
      - correctness-review
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/findings
          pattern: findings-*
          merge-multiple: true
      - name: List collected findings
        run: ls -la /tmp/findings || true
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-haiku-4-5-20251001 --max-turns 10"
          prompt: |
            You are the final reviewer for PR #${{ github.event.pull_request.number }}.
            Specialist agents have written findings JSON files to /tmp/findings/.

            Read every file there, then run this critique pass:

              1. DEDUPLICATE — same issue from multiple agents → keep one.
              2. CULL FALSE POSITIVES — for each finding, ask:
                 "Would a senior engineer actually call this out in review?"
                 If no, drop it. Be aggressive about removing nits, stylistic
                 preferences, and speculative concerns.
              3. CULL LOW CONFIDENCE — if the explanation hedges ("might",
                 "could potentially") and severity isn't high, drop it.
              4. VERIFY — spot-check 1-2 surviving findings against the actual
                 diff via `gh pr diff`. Drop any that don't hold up.
              5. GROUP — by severity: critical / major / minor.
                 Skip the minor section entirely unless there are zero majors.

            Then post ONE consolidated review using `gh pr comment`:

              ## Claude Review

              **Summary**: One sentence on the PR's purpose and overall verdict.

              ### 🔴 Critical
              - `path/to/file.py:42` — Issue and one-line why.

              ### 🟡 Major
              - `path/to/file.py:88` — Issue and one-line why.

              (Omit empty sections. If nothing of substance survived the
              critique pass, post a brief LGTM that names one concrete thing
              the PR does well.)

            Keep the whole comment under 400 words. No preamble, no meta-commentary.
