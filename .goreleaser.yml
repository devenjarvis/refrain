version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: refrain
    binary: refrain
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/devenjarvis/refrain/cmd.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: refrain
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

brews:
  - name: refrain
    repository:
      owner: devenjarvis
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/devenjarvis/refrain"
    description: "Terminal-native TUI for orchestrating multiple Claude Code agents in parallel"
    license: "MIT"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    install: |
      bin.install "refrain"
    test: |
      system "#{bin}/refrain", "--help"
